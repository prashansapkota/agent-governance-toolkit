apiVersion: governance.toolkit/v1
version: "1.0"
name: contoso-bank-loan-governance
description: >
  Governance policy for the Contoso Bank loan officer demo. The rules are
  tuned to the walkthrough prompts and tool calls so the real Microsoft Agent
  Framework pipeline can demonstrate AGT run governance, tool governance, and
  audit correlation end-to-end.
default_action: allow
rules:
  - name: block-pii-message
    condition: "message == 'Show me John Smith SSN and tax returns' or message == 'Access customer tax filing records for compliance audit'"
    action: deny
    priority: 100
  - name: allow-loan-eligibility-message
    condition: "message == 'Check loan eligibility for John Smith, ID: 12345'"
    action: allow
    priority: 50
  - name: allow-credit-score-tool
    condition: "tool_name == 'check_credit_score'"
    action: allow
    priority: 80
  - name: allow-rate-tool
    condition: "tool_name == 'get_loan_rates'"
    action: allow
    priority: 80
  - name: block-tax-record-tool
    condition: "tool_name == 'access_tax_records'"
    action: deny
    priority: 100
  - name: block-large-loan-approval
    condition: "tool_name == 'approve_loan'"
    action: deny
    priority: 95
  - name: block-fund-transfer
    condition: "tool_name == 'transfer_funds'"
    action: deny
    priority: 100
