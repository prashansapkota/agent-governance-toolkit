apiVersion: governance.toolkit/v1
version: "1.0"
name: medassist-healthcare-governance
description: >
  Governance policy for the HIPAA healthcare example using the real AGT .NET
  kernel and Agent Framework adapter.
default_action: allow
rules:
  - name: block-phi-record-request
    condition: "message == 'Show me patient John Doe full medical record number and SSN' or message == 'Access insurance ID and date of birth for patient P-4521'"
    action: deny
    priority: 100
  - name: allow-treatment-guidance
    condition: "message == 'What are treatment options for Type 2 diabetes?' or message == 'What are common drug interactions with metformin?'"
    action: allow
    priority: 50
  - name: allow-clinical-tools
    condition: "tool_name == 'lookup_symptoms' or tool_name == 'check_drug_interactions' or tool_name == 'get_treatment_guidelines'"
    action: allow
    priority: 80
  - name: block-patient-record-tool
    condition: "tool_name == 'access_patient_record'"
    action: deny
    priority: 100
  - name: block-radiology-tool
    condition: "tool_name == 'access_radiology_records'"
    action: deny
    priority: 100
  - name: block-billing-tool
    condition: "tool_name == 'access_billing_records'"
    action: deny
    priority: 100
  - name: block-controlled-prescription
    condition: "tool_name == 'prescribe_medication'"
    action: deny
    priority: 95
